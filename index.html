<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collabs Certify - Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Collabs Certify</h1>
            <p>Step 1: Upload Template & Draw Boxes</p>
        </header>
        
        <div class="controls">
            <input type="file" id="imageLoader" accept="image/png, image/jpeg" />
            <button id="addBoxBtn" disabled>+ Add Box</button>
            <button id="nextStepBtn" disabled>Next: Upload CSV ➡️</button>
        </div>

        <div class="canvas-container-wrapper">
            <canvas id="certCanvas"></canvas>
        </div>
        
        <div class="instructions">
            <p><i>1. Upload your certificate image. 2. Click "+ Add Box" up to 3 times to create n1, n2, and n3 spaces. 3. Drag and resize them over the blank lines.</i></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
